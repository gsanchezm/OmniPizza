# Render Blueprint for OmniPizza QA Platform
# https://render.com

services:
  # Backend Service (FastAPI)
  - type: web
    name: omnipizza-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health
    autoDeploy: true

  # Frontend Service (React)
  - type: web
    name: omnipizza-frontend
    runtime: static
    buildCommand: >
      cd frontend
      && pnpm install --frozen-lockfile
      && export VITE_APP_RELEASE=$RENDER_GIT_COMMIT
      && pnpm build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://omnipizza-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains
      - path: /*
        name: Content-Security-Policy
        value: >-
          default-src 'self';
          img-src 'self' data: https://images.unsplash.com https://upload.wikimedia.org https://placehold.co https://api.dicebear.com;
          font-src 'self' https://fonts.gstatic.com;
          style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
          script-src 'self';
          connect-src 'self' https://omnipizza-backend.onrender.com;
          object-src 'none';
          base-uri 'self';
          frame-ancestors 'none';
    autoDeploy: true

# Database: In-memory (no persistence required)
# The backend reinitializes on each deploy, perfect for QA testing